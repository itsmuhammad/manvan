<!-- Blog Filters -->
<section class="blog-filters">
  <div class="container">
    <div class="blog-search-wrap" style="margin-bottom: 1.5rem;">
      <div style="position: relative; max-width: 400px; margin: 0 auto;">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: #9ca3af;">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="blog-search" placeholder="Search articles..." style="width: 100%; padding: 0.875rem 1rem 0.875rem 2.75rem; border: 2px solid #e5e7eb; border-radius: 0.75rem; font-size: 1rem;">
      </div>
    </div>
    <div class="filter-buttons">
      <button class="filter-btn active" onclick="filterPosts('all')">All Posts</button>
      <button class="filter-btn" onclick="filterPosts('moving_tips')">Moving Tips</button>
      <button class="filter-btn" onclick="filterPosts('moving_guide')">Moving Guide</button>
      <button class="filter-btn" onclick="filterPosts('moving_cost')">Moving Cost</button>
      <button class="filter-btn" onclick="filterPosts('packing_guides')">Packing Guides</button>
      <button class="filter-btn" onclick="filterPosts('abu_dhabi_living')">Abu Dhabi Living</button>
      <button class="filter-btn" onclick="filterPosts('company_news')">Company News</button>
      <button class="filter-btn" onclick="filterPosts('office_moving')">Office Moving</button>
      <button class="filter-btn" onclick="filterPosts('furniture_care')">Furniture Care</button>
      <button class="filter-btn" onclick="filterPosts('cost_saving')">Cost Saving</button>
      <button class="filter-btn" onclick="filterPosts('storage_solutions')">Storage</button>
      <button class="filter-btn" onclick="filterPosts('dubai_moving')">Dubai Moving</button>
      <button class="filter-btn" onclick="filterPosts('villa_moving')">Villa Moving</button>
      <button class="filter-btn" onclick="filterPosts('apartment_moving')">Apartment Moving</button>
    </div>
  </div>
</section>
