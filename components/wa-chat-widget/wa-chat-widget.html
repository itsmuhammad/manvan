        <span class="wa-chat-header-status">Online</span>

      <button type="button" class="wa-close" id="wa-chat-close" aria-label="Close">
        <svg width="14" height="14" viewBox="0 0 14 14" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg>
      </button>
    </div>
    <div class="wa-chat-body">
      <div class="wa-step-1" id="wa-step-1">
        <p class="wa-chat-greeting">Hi! 👋 How can we help you move today?</p>
        <div class="wa-service-chips">
          <button type="button" class="wa-service-chip" data-service="villa">Villa</button>
          <button type="button" class="wa-service-chip" data-service="apartment">Apartment</button>
          <button type="button" class="wa-service-chip" data-service="office">Office</button>
        </div>
        <button type="button" id="wa-send-btn">Start Chat on WhatsApp</button>
      </div>
      <div class="wa-step-2" id="wa-step-2">
        <button type="button" class="wa-back-btn" id="wa-back-btn" aria-label="Back">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <p class="wa-step2-message" id="wa-step2-message"></p>
        <input type="text" id="wa-details-input" class="wa-details-input" placeholder="e.g. From Khalifa City to Yas Island... (optional)" maxlength="200">
        <span class="wa-input-hint">Optional — or just leave your WhatsApp number and we will call you back immediately.</span>
        <span class="wa-error-msg" id="wa-error-msg"></span>
        <button type="button" id="wa-confirm-btn">Start Chat on WhatsApp</button>
      </div>
    </div>
  </div>
