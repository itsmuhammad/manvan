<!-- Contact Form -->
<section class="section">
  <div class="container">
    <div class="contact-grid">
      <div>
        <div id="contact-form-container" class="card" style="padding: 2rem; box-shadow: var(--shadow-xl);">
          <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--gray-900);">Send Us a Message</h2>
          <!-- // lead capture handled by wa-lead-capture.js -->
          <form id="contact-form">
            <input type="hidden" name="_subject" value="New contact from Man With Van website">
            <input type="hidden" name="_next" value="https://manwithvan.ae/contact-thank-you.html">
            <div class="form-grid">
              <div class="form-group">
                <label class="form-label" for="name">Your Name *</label>
                <input type="text" id="name" name="name" class="form-input" placeholder="John Doe" required>
              </div>
              <div class="form-group">
                <label class="form-label" for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" class="form-input" placeholder="+971 50 826 8481" required>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="email">Email Address *</label>
              <input type="email" id="email" name="email" class="form-input" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="subject">Subject *</label>
              <input type="text" id="subject" name="subject" class="form-input" placeholder="How can we help you?" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="message">Message *</label>
              <textarea id="message" name="message" class="form-textarea" placeholder="Tell us more about your inquiry..." rows="6" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Send Message</button>
          </form>
        </div>
      </div>
      <div style="display: flex; flex-direction: column; gap: 1.5rem;">
        <div class="card" style="padding: 1.5rem; box-shadow: var(--shadow-xl);">
          <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--gray-900);">Get In Touch</h3>
          <div class="contact-item">
            <div class="contact-icon"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/></svg></div>
            <div class="contact-details"><h3>Phone</h3><a href="tel:+971508268481">+971 50 826 8481</a></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6" fill="none" stroke="white" stroke-width="2"/></svg></div>
            <div class="contact-details"><h3>Email</h3><a href="mailto:info@manwithvan.ae">info@manwithvan.ae</a></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
            <div class="contact-details"><h3>Location</h3><p>Abu Dhabi, United Arab Emirates</p></div>
          </div>
          <div class="contact-item">
            <div class="contact-icon"><svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2zm4.2 14.2L11 13V7h1.5v5.2l4.5 2.7-.8 1.3z"/></svg></div>
            <div class="contact-details"><h3>Business Hours</h3><p>Monday - Saturday<br>7:00 AM - 8:00 PM</p></div>
          </div>
        </div>
        <div class="card" style="background: linear-gradient(135deg, var(--primary-blue), var(--primary-blue-dark)); color: white; padding: 1.5rem;">
          <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; color: white;">24/7 Emergency Service</h3>
          <p style="color: #bfdbfe; margin-bottom: 1rem;">Need urgent moving assistance? We offer 24/7 emergency moving services.</p>
          <a href="tel:+971508268481" class="btn btn-lg" style="width: 100%; background: white; color: var(--primary-blue);">Call Emergency Line</a>
        </div>
      </div>
    </div>
  </div>
</section>
